version: '3.8'

services:
  # FastAPI 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: book-recommend-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    networks:
      - book-network

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: book-recommend-celery
    command: celery -A app.celery_app worker --loglevel=info --pool=solo
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    networks:
      - book-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: book-recommend-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - book-network

  # PostgreSQL 数据库
  postgres:
    image: postgres:16
    container_name: book-recommend-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-book_recommend}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - book-network

  # 前端 (Vue3)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: book-recommend-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - book-network

volumes:
  redis-data:
  postgres-data:

networks:
  book-network:
    driver: bridge
