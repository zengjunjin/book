# K8s ConfigMap - 应用配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: book-recommend-config
  namespace: book-recommend
data:
  DATABASE_URL: "postgresql://postgres:postgres@postgres-svc:5432/book_recommend"
  CELERY_BROKER_URL: "redis://redis-svc:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis-svc:6379/2"
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  HF_ENDPOINT: "https://hf-mirror.com"
