# Kustomization - 一键部署配置
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: book-recommend

resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - redis.yaml
  - backend.yaml
  - celery.yaml
  - ingress.yaml

images:
  - name: book-recommend/backend
    newTag: latest
